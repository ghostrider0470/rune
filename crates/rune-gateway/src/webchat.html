<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rune WebChat</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-muted: #8b8fa3;
    --accent: #6c7bf7;
    --accent-hover: #8490f9;
    --user-bg: #2a3050;
    --assistant-bg: #1e2130;
    --error: #e5534b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  header h1 { font-size: 16px; font-weight: 600; }
  #status {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--error);
  }
  #status.connected .dot { background: #3fb950; }
  #transcript {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border-bottom-right-radius: 2px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .msg.system {
    align-self: center;
    color: var(--text-muted);
    font-size: 12px;
    font-style: italic;
  }
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #new-session-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  #new-session-btn:hover {
    border-color: var(--accent);
    color: #fff;
  }
  #input-area {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    background: var(--surface);
  }
  #input-area textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
  }
  #input-area textarea:focus { border-color: var(--accent); }
  #input-area button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  #input-area button:hover { background: var(--accent-hover); }
  #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1>Rune WebChat</h1>
  <div id="toolbar">
    <button id="new-session-btn" type="button">New session</button>
    <div id="status"><span class="dot"></span><span id="status-text">Connecting...</span></div>
  </div>
</header>
<div id="transcript"></div>
<div id="input-area">
  <textarea id="msg" rows="1" placeholder="Type a message..." autofocus></textarea>
  <button id="send-btn" disabled>Send</button>
</div>
<script>
(function() {
  const transcript = document.getElementById('transcript');
  const msgInput   = document.getElementById('msg');
  const sendBtn    = document.getElementById('send-btn');
  const statusEl   = document.getElementById('status');
  const statusText = document.getElementById('status-text');
  const newSessionBtn = document.getElementById('new-session-btn');
  const query = new URLSearchParams(location.search);

  let ws = null;
  const sessionStorageKey = 'rune.webchat.session_id';
  let sessionId = query.get('session_id') || window.sessionStorage.getItem(sessionStorageKey);
  let reqCounter = 0;
  const pendingRpc = {};
  const authToken = query.get('api_key') || '';
  const sessionToken = query.get('session_token') || '';

  function buildWsUrl() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsQuery = new URLSearchParams();
    if (authToken) wsQuery.set('api_key', authToken);
    if (sessionToken) wsQuery.set('session_token', sessionToken);
    const suffix = wsQuery.toString();
    return proto + '//' + location.host + '/ws' + (suffix ? '?' + suffix : '');
  }

  function setStatus(connected, text) {
    statusEl.className = connected ? 'connected' : '';
    statusText.textContent = text;
    sendBtn.disabled = !connected || !sessionId;
  }

  function appendMsg(role, text) {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.textContent = text;
    transcript.appendChild(el);
    transcript.scrollTop = transcript.scrollHeight;
  }

  function appendTranscriptEntry(entry) {
    if (!entry || !entry.kind || !entry.payload) return;
    if (entry.kind === 'user_message') {
      const text = entry.payload.content || entry.payload.text || '';
      if (text) appendMsg('user', text);
    } else if (entry.kind === 'assistant_message') {
      const text = entry.payload.content || entry.payload.text || '';
      if (text) appendMsg('assistant', text);
    }
  }

  function persistSessionInUrl() {
    if (!sessionId) return;
    window.sessionStorage.setItem(sessionStorageKey, sessionId);
    const next = new URLSearchParams(location.search);
    next.set('session_id', sessionId);
    if (authToken) next.set('api_key', authToken);
    if (sessionToken) next.set('session_token', sessionToken);
    history.replaceState(null, '', location.pathname + '?' + next.toString());
  }

  function resetTranscript() {
    transcript.innerHTML = '';
  }

  async function startFreshSession() {
    sessionId = null;
    window.sessionStorage.removeItem(sessionStorageKey);
    const next = new URLSearchParams(location.search);
    next.delete('session_id');
    if (authToken) next.set('api_key', authToken);
    if (sessionToken) next.set('session_token', sessionToken);
    history.replaceState(null, '', location.pathname + (next.toString() ? '?' + next.toString() : ''));
    resetTranscript();
    appendMsg('system', 'Starting a new session...');
    setStatus(ws && ws.readyState === WebSocket.OPEN, ws && ws.readyState === WebSocket.OPEN ? 'Connected' : 'Reconnecting...');
    if (ws && ws.readyState === WebSocket.OPEN) {
      try {
        await hydrateSession();
      } catch (e) {
        appendMsg('system', 'Failed to start new session: ' + (e.message || e));
      }
    }
  }

  function rpc(method, params) {
    return new Promise((resolve, reject) => {
      const id = String(++reqCounter);
      pendingRpc[id] = { resolve, reject };
      const payload = Object.assign({}, params || {});
      if (authToken && payload.api_key === undefined) payload.api_key = authToken;
      ws.send(JSON.stringify({ type: 'req', id, method, params: payload }));
    });
  }

  async function hydrateSession() {
    if (sessionId) {
      ws.send(JSON.stringify({ type: 'subscribe', session_id: sessionId }));
      appendMsg('system', query.get('session_id') ? 'Resumed session.' : 'Resumed this browser session.');
      const existing = await rpc('session.transcript', { session_id: sessionId });
      if (Array.isArray(existing)) {
        existing.forEach(appendTranscriptEntry);
      }
      sendBtn.disabled = false;
      return;
    }

    const res = await rpc('session.create', { kind: 'direct', channel_ref: 'webchat' });
    sessionId = res.id;
    persistSessionInUrl();
    sendBtn.disabled = false;
    ws.send(JSON.stringify({ type: 'subscribe', session_id: sessionId }));
    appendMsg('system', 'Session started.');
  }

  function connect() {
    ws = new WebSocket(buildWsUrl());

    ws.onopen = async function() {
      setStatus(true, 'Connected');
      try {
        await hydrateSession();
      } catch(e) {
        appendMsg('system', 'Failed to initialize session: ' + (e.message || e));
      }
    };

    ws.onmessage = function(ev) {
      let frame;
      try { frame = JSON.parse(ev.data); } catch(_) { return; }

      if (frame.type === 'res') {
        const p = pendingRpc[frame.id];
        if (p) {
          delete pendingRpc[frame.id];
          if (frame.ok) p.resolve(frame.payload);
          else p.reject(frame.error);
        }
      } else if (frame.type === 'event') {
        handleEvent(frame);
      }
    };

    ws.onclose = function() {
      setStatus(false, 'Disconnected. Reconnecting...');
      sendBtn.disabled = true;
      setTimeout(connect, 2000);
    };

    ws.onerror = function() {
      ws.close();
    };
  }

  function handleEvent(frame) {
    const p = frame.payload || {};
    const kind = frame.kind || p.kind || '';
    if (kind === 'turn_complete' || kind === 'turn_finished') {
      const text = p.assistant_text || p.response || p.text || '';
      if (text) appendMsg('assistant', text);
    } else if (kind === 'transcript_append' && p.role === 'assistant') {
      if (p.content) appendMsg('assistant', p.content);
    }
  }

  async function send() {
    const text = msgInput.value.trim();
    if (!text || !sessionId) return;
    msgInput.value = '';
    autoResize();
    appendMsg('user', text);
    sendBtn.disabled = true;
    try {
      const res = await rpc('session.send', { session_id: sessionId, content: text });
      const inlineReply = res && (res.assistant_reply || res.assistant_text || res.response || res.text);
      if (inlineReply) {
        appendMsg('assistant', inlineReply);
      }
    } catch(e) {
      appendMsg('system', 'Error: ' + (e.message || JSON.stringify(e)));
    }
    sendBtn.disabled = false;
  }

  function autoResize() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  }

  newSessionBtn.addEventListener('click', startFreshSession);
  sendBtn.addEventListener('click', send);
  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  msgInput.addEventListener('input', autoResize);

  connect();
})();
</script>
</body>
</html>
