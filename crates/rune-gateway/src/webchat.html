<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rune WebChat</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-muted: #8b8fa3;
    --accent: #6c7bf7;
    --accent-hover: #8490f9;
    --user-bg: #2a3050;
    --assistant-bg: #1e2130;
    --error: #e5534b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  header h1 { font-size: 16px; font-weight: 600; }
  #status {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--error);
  }
  #status.connected .dot { background: #3fb950; }
  #layout {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
  }
  #sidebar {
    border-right: 1px solid var(--border);
    background: #141823;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #sidebar-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  #session-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .session-item {
    width: 100%;
    text-align: left;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
  }
  .session-item:hover {
    border-color: var(--accent);
  }
  .session-item.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(108,123,247,0.25) inset;
  }
  .session-item-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .session-item-meta {
    font-size: 11px;
    color: var(--text-muted);
  }
  #auth-badge {
    display: inline-block;
    margin-left: 6px;
    padding: 2px 6px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-muted);
    vertical-align: middle;
  }
  #main {
    min-width: 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #transcript {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border-bottom-right-radius: 2px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .msg.system {
    align-self: center;
    color: var(--text-muted);
    font-size: 12px;
    font-style: italic;
  }
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #new-session-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  #new-session-btn:hover {
    border-color: var(--accent);
    color: #fff;
  }
  #input-area {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    background: var(--surface);
  }
  #input-area textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
  }
  #input-area textarea:focus { border-color: var(--accent); }
  #input-area button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  #input-area button:hover { background: var(--accent-hover); }
  #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1>Rune WebChat</h1>
  <div id="toolbar">
    <button id="new-session-btn" type="button">New session</button>
    <div id="status"><span class="dot"></span><span id="status-text">Connecting...</span></div>
  </div>
</header>
<div id="layout">
  <aside id="sidebar">
    <div id="sidebar-header">Browser sessions <span id="auth-badge"></span></div>
    <div id="session-list"></div>
  </aside>
  <main id="main">
    <div id="transcript"></div>
    <div id="input-area">
      <textarea id="msg" rows="1" placeholder="Type a message..." autofocus></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </main>
</div>

<script>
(function() {
  const transcript = document.getElementById('transcript');
  const msgInput   = document.getElementById('msg');
  const sendBtn    = document.getElementById('send-btn');
  const statusEl   = document.getElementById('status');
  const statusText = document.getElementById('status-text');
  const newSessionBtn = document.getElementById('new-session-btn');
  const sessionListEl = document.getElementById('session-list');
  const authBadgeEl = document.getElementById('auth-badge');
  const query = new URLSearchParams(location.search);

  let ws = null;
  const sessionStorageKey = 'rune.webchat.session_id';
  const requestedSessionId = query.get('session_id') || '';
  let sessionId = requestedSessionId || window.sessionStorage.getItem(sessionStorageKey);
  let explicitSessionRequested = Boolean(requestedSessionId);
  let reqCounter = 0;
  let pendingRpc = {};
  let pendingAssistantMsg = null;
  let reconnectAttempt = 0;
  let reconnectTimer = null;
  let pollTimer = null;
  let sendCooldownUntil = 0;
  const pendingOutbound = [];
  const authToken = query.get('api_key') || '';
  const authHeaderToken = query.get('auth') || authToken;
  const sessionToken = query.get('session_token') || '';
  const browserSessionKey = 'rune.webchat.browser_session_token';
  let browserSessionToken = sessionToken || query.get('browser_session') || window.sessionStorage.getItem(browserSessionKey) || '';

  let knownSessions = [];
  const sessionTokenKey = 'rune.webchat.session_auth_tokens';
  let sessionAuthTokens = loadSessionAuthTokens();


  function loadSessionAuthTokens() {
    try {
      const raw = window.localStorage.getItem(sessionTokenKey);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
    } catch (_) {
      return {};
    }
  }

  function persistSessionAuthTokens() {
    try {
      window.localStorage.setItem(sessionTokenKey, JSON.stringify(sessionAuthTokens));
    } catch (_) {
    }
  }

  function authLabel() {
    if (authToken) return 'gateway auth';
    return 'session auth';
  }

  function authTokenForSession(targetSessionId) {
    if (authToken) return authToken;
    if (!targetSessionId) return '';
    return sessionAuthTokens[targetSessionId] || '';
  }

  function ensureSessionToken(targetSessionId, rotate) {
    if (authToken || !targetSessionId) return '';
    if (!rotate && sessionAuthTokens[targetSessionId]) return sessionAuthTokens[targetSessionId];
    const token = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : String(Date.now()) + '-' + Math.random().toString(16).slice(2);
    sessionAuthTokens[targetSessionId] = token;
    persistSessionAuthTokens();
    return token;
  }

  function updateAuthBadge() {
    if (!authBadgeEl) return;
    authBadgeEl.textContent = authLabel();
    authBadgeEl.title = authToken
      ? 'Using shared gateway API key from the URL.'
      : 'Using per-session browser token so each thread can be reopened safely without a shared gateway key.';
  }

  function formatRelative(iso) {
    if (!iso) return 'unknown';
    const value = new Date(iso);
    if (Number.isNaN(value.getTime())) return iso;
    const diffMs = Date.now() - value.getTime();
    const diffMin = Math.max(0, Math.round(diffMs / 60000));
    if (diffMin < 1) return 'just now';
    if (diffMin < 60) return diffMin + 'm ago';
    const diffHr = Math.round(diffMin / 60);
    if (diffHr < 24) return diffHr + 'h ago';
    const diffDay = Math.round(diffHr / 24);
    return diffDay + 'd ago';
  }

  function renderSessionList() {
    sessionListEl.innerHTML = '';
    const sessions = knownSessions.slice();
    if (sessionId && !sessions.some((item) => item.id === sessionId)) {
      sessions.unshift({ id: sessionId, status: 'active', kind: 'direct', channel: sessionChannelRef(), created_at: new Date().toISOString(), metadata: { browser_auth_mode: authLabel() } });
    }
    if (!sessions.length) {
      const empty = document.createElement('div');
      empty.className = 'msg system';
      empty.textContent = 'No browser sessions yet.';
      sessionListEl.appendChild(empty);
      return;
    }
    sessions.forEach((item) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'session-item' + (item.id === sessionId ? ' active' : '');
      button.innerHTML = '<div class="session-item-title">' + (item.id === sessionId ? 'Current session' : 'Session') + '</div>' +
        '<div class="session-item-meta">' +
        (item.channel || 'webchat') + ' • ' + (item.status || 'unknown') + ' • ' + (((item.metadata || {}).browser_auth_mode) || authLabel()) + ' • ' + formatRelative(item.created_at) +
        '</div>';
      button.addEventListener('click', function() {
        if (item.id === sessionId) return;
        openSession(item.id, false).catch((e) => appendMsg('system', 'Failed to switch session: ' + (e.message || e)));
      });
      sessionListEl.appendChild(button);
    });
  }

  async function refreshSessionList() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    try {
      const sessions = await rpc('session.list', { limit: 50, channel: sessionChannelRef(), include_metadata: true });
      knownSessions = Array.isArray(sessions) ? sessions : [];
      renderSessionList();
    } catch (_) {
    }
  }

  async function openSession(nextSessionId, fromLink) {
    explicitSessionRequested = Boolean(fromLink);
    const previousSessionId = sessionId;
    sessionId = nextSessionId;
    resetTranscript();
    persistSessionInUrl();
    if (previousSessionId && previousSessionId !== sessionId) {
      ws.send(JSON.stringify({ type: 'req', id: 'unsub-' + String(++reqCounter), method: 'unsubscribe', params: { session_id: previousSessionId } }));
    }
    ws.send(JSON.stringify({ type: 'subscribe', session_id: sessionId }));
    updateAuthBadge();
    appendMsg('system', fromLink ? 'Opened session from browser history.' : 'Switched session.');
    const existing = await rpc('session.transcript', { session_id: sessionId });
    if (Array.isArray(existing)) existing.forEach(appendTranscriptEntry);
    sendBtn.disabled = false;
    renderSessionList();
  }

  function buildWsUrl() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsQuery = new URLSearchParams();
    if (authToken) wsQuery.set('api_key', authToken);
    if (browserSessionToken) wsQuery.set('session_token', browserSessionToken);
    if (sessionId) wsQuery.set('session_id', sessionId);
    const suffix = wsQuery.toString();
    return proto + '//' + location.host + '/ws' + (suffix ? '?' + suffix : '');
  }

  function wsProtocols() {
    return authHeaderToken ? ['rune-ws', 'Bearer ' + authHeaderToken] : ['rune-ws'];
  }

  function setStatus(connected, text) {
    statusEl.className = connected ? 'connected' : '';
    statusText.textContent = text;
    sendBtn.disabled = !connected || !sessionId || isCooldownActive();
  }

  function nowMs() {
    return Date.now();
  }

  function isCooldownActive() {
    return sendCooldownUntil > nowMs();
  }

  function updateSendAvailability() {
    sendBtn.disabled = !ws || ws.readyState !== WebSocket.OPEN || !sessionId || isCooldownActive();
    if (isCooldownActive()) {
      const seconds = Math.max(1, Math.ceil((sendCooldownUntil - nowMs()) / 1000));
      setStatus(false, 'Rate limited. Retry in ' + seconds + 's');
    }
  }

  function scheduleCooldown(seconds) {
    sendCooldownUntil = nowMs() + (Math.max(1, seconds) * 1000);
    updateSendAvailability();
    const tick = function() {
      if (!isCooldownActive()) {
        sendCooldownUntil = 0;
        if (ws && ws.readyState === WebSocket.OPEN) {
          stopPollingFallback();
          setStatus(true, 'Connected');
        }
        updateSendAvailability();
        return;
      }
      updateSendAvailability();
      window.setTimeout(tick, 1000);
    };
    window.setTimeout(tick, 1000);
  }

  function queueOutbound(text) {
    pendingOutbound.push(text);
    appendMsg('system', 'Queued message until WebChat reconnects.');
  }

  async function flushOutboundQueue() {
    if (!pendingOutbound.length || !ws || ws.readyState !== WebSocket.OPEN || !sessionId || isCooldownActive()) return;
    const queued = pendingOutbound.splice(0, pendingOutbound.length);
    for (const text of queued) {
      msgInput.value = text;
      await send(true);
    }
  }

  function appendMsg(role, text) {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.textContent = text;
    transcript.appendChild(el);
    transcript.scrollTop = transcript.scrollHeight;
  }

  function appendStreamingAssistant(text) {
    const value = text == null ? '' : String(text);
    if (pendingAssistantMsg) {
      pendingAssistantMsg.textContent = value;
    } else {
      pendingAssistantMsg = document.createElement('div');
      pendingAssistantMsg.className = 'msg assistant';
      pendingAssistantMsg.textContent = value;
      transcript.appendChild(pendingAssistantMsg);
    }
    transcript.scrollTop = transcript.scrollHeight;
  }

  function clearPendingAssistant() {
    pendingAssistantMsg = null;
  }

  function appendTranscriptEntry(entry) {
    if (!entry || !entry.kind || !entry.payload) return;
    if (entry.kind === 'user_message') {
      const message = entry.payload.message || {};
      const text = message.content || entry.payload.content || entry.payload.text || '';
      if (text) appendMsg('user', text);
    } else if (entry.kind === 'assistant_message') {
      const text = entry.payload.content || entry.payload.text || '';
      if (text) appendMsg('assistant', text);
    } else if (entry.kind === 'tool_result') {
      const output = entry.payload.output || '';
      if (output) appendMsg(entry.payload.is_error ? 'system' : 'assistant', output);
    }
  }

  function sessionChannelRef() {
    return browserSessionToken ? 'webchat:' + browserSessionToken : 'webchat:anonymous';
  }

  function persistSessionInUrl() {
    const next = new URLSearchParams(location.search);
    if (!sessionId) {
      explicitSessionRequested = false;
      next.delete('session_id');
      if (authToken) next.set('api_key', authToken);
      if (browserSessionToken) next.set('session_token', browserSessionToken);
      history.replaceState(null, '', location.pathname + (next.toString() ? '?' + next.toString() : ''));
      renderSessionList();
      return;
    }
    window.sessionStorage.setItem(sessionStorageKey, sessionId);
    renderSessionList();
    const next = new URLSearchParams(location.search);
    next.set('session_id', sessionId);
    explicitSessionRequested = true;
    if (authToken) next.set('api_key', authToken);
    if (browserSessionToken) next.set('session_token', browserSessionToken);
    history.replaceState(null, '', location.pathname + '?' + next.toString());
  }

  function persistBrowserSessionToken() {
    if (browserSessionToken) {
      window.sessionStorage.setItem(browserSessionKey, browserSessionToken);
    } else {
      window.sessionStorage.removeItem(browserSessionKey);
    }
  }

  persistBrowserSessionToken();

  function resetTranscript() {
    transcript.innerHTML = '';
    clearPendingAssistant();
  }

  async function startFreshSession() {
    sessionId = null;
    browserSessionToken = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : String(Date.now()) + '-' + Math.random().toString(16).slice(2);
    persistBrowserSessionToken();
    window.sessionStorage.removeItem(sessionStorageKey);
    const next = new URLSearchParams(location.search);
    next.delete('session_id');
    if (authToken) next.set('api_key', authToken);
    if (browserSessionToken) next.set('session_token', browserSessionToken);
    history.replaceState(null, '', location.pathname + (next.toString() ? '?' + next.toString() : ''));
    resetTranscript();
    appendMsg('system', 'Starting a new session...');
    renderSessionList();
    setStatus(ws && ws.readyState === WebSocket.OPEN, ws && ws.readyState === WebSocket.OPEN ? 'Connected' : 'Reconnecting...');
    if (ws && ws.readyState === WebSocket.OPEN) {
      try {
        await hydrateSession();
      } catch (e) {
        appendMsg('system', 'Failed to start new session: ' + (e.message || e));
      }
    }
  }

  function rpc(method, params) {
    return new Promise((resolve, reject) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        reject(new Error('WebSocket is not connected'));
        return;
      }
      const id = String(++reqCounter);
      pendingRpc[id] = { resolve, reject };
      const payload = Object.assign({}, params || {});
      const sessionApiKey = authTokenForSession((params || {}).session_id || sessionId);
      if (sessionApiKey && payload.api_key === undefined) payload.api_key = sessionApiKey;
      ws.send(JSON.stringify({ type: 'req', id, method, params: payload }));
    });
  }

  async function hydrateSession() {
    if (sessionId) {
      const resumedLabel = requestedSessionId ? 'Resumed session from link.' : 'Resumed this browser session.';
      await openSession(sessionId, explicitSessionRequested);
      appendMsg('system', resumedLabel);
      await refreshSessionList();
      return;
    }

    const res = await rpc('session.resolve', { kind: 'direct', channel_ref: sessionChannelRef(), metadata: { browser_auth_mode: authLabel() } });
    sessionId = res.id;
    ensureSessionToken(sessionId, false);
    persistSessionInUrl();
    sendBtn.disabled = false;
    ws.send(JSON.stringify({ type: 'subscribe', session_id: sessionId }));
    updateAuthBadge();
    appendMsg('system', 'Session started.');
    await refreshSessionList();
  }

  function startPollingFallback() {
    if (pollTimer || !sessionId) return;
    pollTimer = window.setInterval(async function() {
      if (ws && ws.readyState === WebSocket.OPEN) return;
      if (!sessionId) return;
      try {
        const transcriptToken = authTokenForSession(sessionId);
        const response = await fetch('/sessions/' + encodeURIComponent(sessionId) + '/transcript' + (transcriptToken ? ('?api_key=' + encodeURIComponent(transcriptToken)) : ''));
        if (!response.ok) return;
        const existing = await response.json();
        resetTranscript();
        if (Array.isArray(existing)) existing.forEach(appendTranscriptEntry);
      } catch (_) {
      }
    }, 3000);
  }

  function stopPollingFallback() {
    if (pollTimer) {
      window.clearInterval(pollTimer);
      pollTimer = null;
    }
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectAttempt += 1;
    const delay = Math.min(10000, Math.pow(2, Math.min(reconnectAttempt, 5)) * 1000);
    setStatus(false, 'Disconnected. Reconnecting in ' + Math.ceil(delay / 1000) + 's...');
    reconnectTimer = window.setTimeout(function() {
      reconnectTimer = null;
      updateAuthBadge();
  connect();
    }, delay);
  }

  function rejectPendingRpc(message) {
    Object.keys(pendingRpc).forEach(function(key) {
      pendingRpc[key].reject(new Error(message));
      delete pendingRpc[key];
    });
  }

  function connect() {
    ws = new WebSocket(buildWsUrl(), wsProtocols());
    pendingRpc = {};

    ws.onopen = async function() {
      reconnectAttempt = 0;
      if (reconnectTimer) {
        window.clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      stopPollingFallback();
      setStatus(true, 'Connected');
      updateSendAvailability();
      try {
        await hydrateSession();
        await refreshSessionList();
        await flushOutboundQueue();
      } catch(e) {
        appendMsg('system', 'Failed to initialize session: ' + (e.message || e));
      }
    };

    ws.onmessage = function(ev) {
      let frame;
      try { frame = JSON.parse(ev.data); } catch(_) { return; }

      if (frame.type === 'res') {
        const p = pendingRpc[frame.id];
        if (p) {
          delete pendingRpc[frame.id];
          if (frame.ok) p.resolve(frame.payload);
          else p.reject(frame.error);
        }
      } else if (frame.type === 'event') {
        handleEvent(frame);
      }
    };

    ws.onclose = function() {
      rejectPendingRpc('WebSocket disconnected');
      sendBtn.disabled = true;
      startPollingFallback();
      scheduleReconnect();
    };

    ws.onerror = function() {
      ws.close();
    };
  }

  function eventSessionId(payload) {
    if (!payload || typeof payload !== 'object') return '';
    return payload.session_id || payload.sessionId || '';
  }

  function isCurrentSessionEvent(payload) {
    const target = eventSessionId(payload);
    return !target || !sessionId || target === sessionId;
  }

  function handleEvent(frame) {
    const p = frame.payload || {};
    const kind = frame.kind || p.kind || '';
    if (kind === 'session_created') {
      refreshSessionList();
      return;
    }
    if (kind === 'turn_complete' || kind === 'turn_finished' || kind === 'turn_completed' || kind === 'turn.completed') {
      if (!isCurrentSessionEvent(p)) {
        refreshSessionList();
        return;
      }
      const text = p.assistant_text || p.assistant_reply || p.response || p.text || '';
      if (text) {
        appendStreamingAssistant(text);
      }
      clearPendingAssistant();
      refreshSessionList();
    } else if (kind === 'turn.progressed') {
      if (!isCurrentSessionEvent(p)) return;
      const status = p.status || '';
      if (status) appendStreamingAssistant('[' + status + ']');
    } else if (kind === 'transcript_append') {
      if (!isCurrentSessionEvent(p)) return;
      const role = p.role || p.kind || '';
      const content = p.content || p.text || '';
      if (role === 'assistant') {
        if (content) appendStreamingAssistant(content);
      } else if (role === 'user' && content) {
        appendMsg('user', content);
      }
    } else if (kind === 'session.updated' || kind === 'session_state') {
      refreshSessionList();
    }
  }

  async function send(fromQueue) {
    const text = msgInput.value.trim();
    if (!text || !sessionId) return;
    msgInput.value = '';
    autoResize();
    if (!fromQueue) appendMsg('user', text);
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      queueOutbound(text);
      scheduleReconnect();
      return;
    }
    if (isCooldownActive()) {
      queueOutbound(text);
      updateSendAvailability();
      return;
    }
    sendBtn.disabled = true;
    try {
      clearPendingAssistant();
      const res = await rpc('session.send', { session_id: sessionId, content: text });
      const inlineReply = res && (res.assistant_reply || res.assistant_text || res.response || res.text);
      if (inlineReply) {
        appendStreamingAssistant(inlineReply);
        clearPendingAssistant();
      }
    } catch(e) {
      const message = e && (e.message || e.error || e.code || JSON.stringify(e));
      const payload = e && e.data ? e.data : e;
      const retryAfter = payload && (payload.retry_after_seconds || payload.retryAfterSeconds || payload.retry_after);
      if (retryAfter) {
        queueOutbound(text);
        scheduleCooldown(Number(retryAfter));
      } else {
        appendMsg('system', 'Error: ' + message);
      }
    }
    updateSendAvailability();
  }

  function autoResize() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  }

  newSessionBtn.addEventListener('click', startFreshSession);
  sendBtn.addEventListener('click', send);
  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  msgInput.addEventListener('input', autoResize);

  updateAuthBadge();
  connect();
})();
</script>
</body>
</html>
