[package]
name = "rune-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
rune-core = { path = "../rune-core" }
rune-config = { path = "../rune-config" }
async-trait.workspace = true
deadpool-diesel = { version = "0.6.1", features = ["postgres"] }
diesel = { workspace = true, features = ["postgres", "uuid", "chrono", "serde_json"] }
diesel-async = { workspace = true, features = ["postgres", "deadpool", "async-connection-wrapper"] }
diesel_migrations = "2.2.0"
postgresql_embedded = { version = "0.18.2", features = ["tokio"] }
serde.workspace = true
serde_json.workspace = true
semver = "1"
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
uuid.workspace = true
chrono.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
