[gateway]
host = "127.0.0.1"
port = 18790

[instance]
# id defaults to a persisted UUID under ~/.rune/instance-id
# name defaults to the same value as id unless overridden
name = "rune-local"
# advertised_addr = "http://127.0.0.1:18790"
# roles = ["gateway"]
# peers = [
#   { id = "rune-laptop", health_url = "http://192.168.1.50:18790/api/v1/instance/health" },
# ]

[database]
# backend = "auto" # auto => postgres when database_url is set, cosmos when cosmos_endpoint is set, otherwise sqlite
run_migrations = true
# database_url = "postgresql://user:pass@localhost/rune"
# sqlite_path = "/data/db/rune.db"
# cosmos_endpoint = "https://example.documents.azure.com:443/"
# cosmos_key = "<cosmos-account-key>"
# Azure SQL Database fields are reserved for future support tracked in issue #782.
# backend = "azure_sql"
# azure_sql_server = "server.database.windows.net"
# azure_sql_database = "rune"
# azure_sql_user = "rune-user"
# azure_sql_password = "<password>"
# azure_sql_access_token = "<optional-aad-access-token>"
# Azure SQL Database is not supported yet; use Azure Database for PostgreSQL for Azure-hosted relational deployments today.

[channels]
# telegram_token = "YOUR_BOT_TOKEN"
# google_chat_service_account = "/path/to/google-chat-service-account.json"
# google_chat_listen_addr = "0.0.0.0:3300"
# google_chat_verification_token = "shared-secret"

[ms365]
# tenant_id = "00000000-0000-0000-0000-000000000000"
# client_id = "11111111-1111-1111-1111-111111111111"
# user_principal = "user@example.com"
# scopes = ["User.Read", "Mail.Read", "Calendars.Read"]

[models]
default_model = "oc-01-anthropic/claude-sonnet-4-6"

[[models.providers]]
name = "oc-01-anthropic"
kind = "anthropic"
base_url = "https://oc-01-resource.services.ai.azure.com/anthropic"
api_key_env = "OC_01_ANTHROPIC_API_KEY"
api_version = "2023-06-01"
models = ["claude-opus-4-6", "claude-sonnet-4-6"]

[[models.providers]]
name = "oc-01-openai"
kind = "openai"
base_url = "https://oc-01-resource.services.ai.azure.com/openai/v1"
api_key_env = "OC_01_OPENAI_API_KEY"
models = ["gpt-5.4", "gpt-5.4-pro"]

[[models.providers]]
name = "hamza-eastus2"
kind = "openai"
base_url = "https://hamza-eastus2.services.ai.azure.com/openai/v1"
api_key_env = "HAMZA_EASTUS2_API_KEY"
models = [
  "gpt-5.4",
  "gpt-5.4-pro",
  "gpt-5.3-chat",
  "grok-4-fast-reasoning",
  "Kimi-K2.5",
]


[[models.providers]]
name = "openrouter"
kind = "openrouter"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
models = ["openai/gpt-4o-mini", "anthropic/claude-3.5-sonnet"]

[[models.providers]]
name = "perplexity"
kind = "perplexity"
base_url = "https://api.perplexity.ai"
api_key_env = "PERPLEXITY_API_KEY"
models = ["sonar", "sonar-pro"]

[[models.providers]]
name = "openai-codex"
kind = "openai"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
models = ["gpt-5.3-codex"]

[agents.defaults]
model = "oc-01-anthropic/claude-opus-4-6"
workspace = "/home/hamza/.openclaw/workspace"
system_prompt = "You are Rune, a coding-focused assistant."

[[agents.list]]
id = "main"
default = true
model = "oc-01-anthropic/claude-opus-4-6"
workspace = "/home/hamza/.openclaw/workspace"

[[agents.list]]
id = "coder"
model = "openai-codex/gpt-5.3-codex"
workspace = "/home/hamza/.openclaw/workspace"

[[agents.list]]
id = "fast"
model = "oc-01-anthropic/claude-sonnet-4-6"


[runtime.lanes]
# Main interactive sessions (default direct/operator work)
main_capacity = 4
# Subagent / spawned coding sessions
subagent_capacity = 8
# Scheduled, heartbeat, and passive trigger work
cron_capacity = 1024
# Max concurrent tool executions across the whole runtime
global_tool_capacity = 32
# Max concurrent tool executions per project lane
project_tool_capacity = 4

[logging]
level = "info"
json = true

[paths]
db_dir = "/data/db"
sessions_dir = "/data/sessions"
memory_dir = "/data/memory"
media_dir = "/data/media"
skills_dir = "/data/skills"
plugins_dir = "/data/plugins"
logs_dir = "/data/logs"
backups_dir = "/data/backups"
config_dir = "/config"
secrets_dir = "/secrets"
